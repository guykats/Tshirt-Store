version: 2

updates:
  # PHP dependencies (composer.json / composer.lock live at repo root)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      composer-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # JS dependencies (package.json / package-lock.json live at repo root,
  # alongside composer.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow files under .github/workflows/
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
