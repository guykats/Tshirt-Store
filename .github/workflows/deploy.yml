name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Pull latest code, install PHP dependencies, and migrate
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # Maintenance mode brackets the riskiest part of the deploy (code swap +
            # migrations) so requests don't land mid-migration against a half-updated
            # schema. The trap guarantees `up` runs even if a step below fails, so a
            # bad migration can't leave the site down indefinitely — it can still leave
            # the schema in a partial state that needs manual review, but the site
            # itself won't hang in maintenance mode waiting on a step that never ran.
            php artisan down --render="errors::503" --retry=30 || true
            trap 'php artisan up || true' EXIT

            git fetch origin main
            git reset --hard origin/main
            composer install --no-dev --optimize-autoloader --no-interaction

            # Clear (not cache) config before migrating, so migrations run against
            # whatever .env actually says now rather than a stale cache from the
            # previous deploy that may predate a config/env change this deploy needs.
            php artisan config:clear
            php artisan migrate --force
            php artisan storage:link || true

      - name: Upload built frontend assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "public/build/*"
          target: "${{ secrets.DEPLOY_PATH }}/public/build"
          strip_components: 2

      - name: Recache config, routes and views
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
